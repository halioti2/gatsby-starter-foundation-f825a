backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} \"{{slug}}\""
    update: "Update {{collection}} \"{{slug}}\""
    delete: "Delete {{collection}} \"{{slug}}\""
    uploadMedia: "[skip ci] Upload \"{{path}}\""
    deleteMedia: "[skip ci] Delete \"{{path}}\""

# Uncomment local_backend when you need to develop locally
# Then run `npx netlify-cms-proxy-server` in another terminal
local_backend: true

media_folder: "static/assets"
public_folder: "/assets"

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    description: "Create and edit blog posts"
    folder: "src/content/posts"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{year}}/{{month}}/{{day}}"
    create: true
    fields:
      - {
          label: "Template",
          name: "template",
          widget: "hidden",
          default: "blog-post",
        }
      - {
          label: "Title",
          name: "title",
          widget: "string",
          tagname: "h1",
        }
      - {
          label: "Slug",
          name: "slug",
          widget: "string",
          hint: "Start slug with /. Use only alphanumeric characters, - and _. Avoid spaces.",
        }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          dateFormat: "YYYY-MM-DD",
          timeFormat: "HH:mm",
          format: "YYYY-MM-DDTHH:mm:ss.SSSZ",
        }
      - {
          label: "SEO Description",
          name: "description",
          widget: "text",
        }
      - {
          label: "Featured Image",
          name: "featuredImage",
          widget: "image",
          required: false,
        }
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          hint: "Main content goes here.",
        }

  - label: "Pages"
    name: "pages"
    files:
      - label: "Home"
        name: "home"
        file: "src/content/pages/index.md"
        fields:
          - {
              label: "Template",
              name: "template",
              widget: "hidden",
              default: "index-page",
            }
          - {
              label: "Slug",
              name: "slug",
              widget: "hidden",
              default: "/",
            }
          - {
              label: "Title",
              name: "title",
              widget: "string",
            }
          - {
              label: "Tagline",
              name: "tagline",
              widget: "string",
            }
          - {
              label: "Featured Image",
              name: "featuredImage",
              widget: "image",
            }
          - {
              label: "Body",
              name: "body",
              widget: "markdown",
            }
          - label: "CTA (Call to Action)"
            name: "cta"
            widget: "object"
            fields:
              - {
                  name: "ctaText",
                  label: "CTA Text",
                  widget: "string",
                }
              - {
                  name: "ctaLink",
                  label: "CTA Link",
                  widget: "string",
                }

      - label: "About"
        name: "about"
        file: "src/content/pages/about.md"
        fields:
          - {
              label: "Template",
              name: "template",
              widget: "hidden",
              default: "about-page",
            }
          - {
              label: "Slug",
              name: "slug",
              widget: "hidden",
              default: "/about",
            }
          - {
              label: "Title",
              name: "title",
              widget: "string",
            }
          - {
              label: "Body",
              name: "body",
              widget: "markdown",
            }

      - label: "Contact"
        name: "contact"
        file: "src/content/pages/contact.md"
        fields:
          - {
              label: "Template",
              name: "template",
              widget: "hidden",
              default: "contact-page",
            }
          - {
              label: "Slug",
              name: "slug",
              widget: "hidden",
              default: "/contact",
            }
          - {
              label: "Title",
              name: "title",
              widget: "string",
            }
          - {
              label: "Body",
              name: "body",
              widget: "markdown",
            }

  - name: "settings"
    label: "Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "src/util/site.json"
        fields:
          - label: "Meta"
            name: "meta"
            widget: "object"
            fields:
              - {
                  widget: "string",
                  name: "title",
                  label: "Site Title",
                  required: true,
                }
              - {
                  widget: "string",
                  name: "titleTemplate",
                  label: "Title Template",
                  default: "%s",
                  required: true,
                }
              - {
                  widget: "string",
                  name: "siteUrl",
                  label: "Website URL",
                  required: true,
                }
              - {
                  widget: "text",
                  name: "description",
                  label: "Description",
                  default: "",
                  required: false,
                }
              - {
                  widget: "image",
                  name: "image",
                  label: "Default Image",
                  default: "/assets/stackrole.png",
                }
              - {
                  widget: "image",
                  name: "iconimage",
                  label: "Favicon",
                }
              - {
                  widget: "string",
                  name: "twitterUsername",
                  label: "Twitter Username",
                  required: false,
                }
          - {
              label: "Google Analytics Tracking ID",
              name: "ga",
              widget: "string",
              hint: "e.g., UA-XXXXXXXXX-X",
              required: false,
            }

      - label: "Social Media Icons"
        name: "socialIcons"
        file: "src/util/socialmedia.json"
        fields:
          - label: "Social Icons"
            name: "socialIcons"
            widget: "list"
            collapsed: true
            hint: "Add social media links and icons"
            fields:
              - {
                  label: "Icon",
                  name: "icon",
                  widget: "select",
                  options:
                    [
                      "facebook",
                      "twitter",
                      "linkedin",
                      "youtube",
                      "instagram",
                      "rss",
                      "github",
                      "telegram",
                      "pinterest",
                      "snapchat",
                      "skype",
                      "wordpress",
                      "tiktok",
                      "dribbble",
                      "medium",
                      "behance",
                      "vk",
                    ],
                  hint: "Select the Icon",
                }
              - {
                  widget: "string",
                  name: "url",
                  label: "URL",
                  required: true,
                  hint: "Paste the URL to your social media profile",
                }

  - label: "Appearance"
    name: "appearance"
    identifier_field: "name"
    files:
      - label: "Default Theme Color"
        name: "themescolors"
        file: "src/util/default-colors.json"
        fields:
          - {
              label: "Primary Color",
              name: "siteColor",
              widget: "color",
              enableAlpha: true,
              allowInput: true,
            }

      - label: "Dark Theme Color"
        name: "darkthemescolors"
        file: "src/util/dark-theme-colors.json"
        fields:
          - {
              label: "Primary Color",
              name: "siteColor",
              widget: "color",
              enableAlpha: true,
              allowInput: true,
            }
